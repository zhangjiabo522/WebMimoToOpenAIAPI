<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebMimoToOpenAIAPI</title>
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #475569;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.8rem; color: var(--primary); margin-bottom: 5px; }
        .header a { color: var(--primary); }
        .card { background: var(--bg-card); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
        .card h2 { font-size: 1rem; margin-bottom: 12px; color: var(--text-muted); }
        
        /* Tabs */
        .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .stat-item { background: var(--bg-input); padding: 12px; border-radius: 8px; text-align: center; }
        .stat-value { font-size: 1.2rem; font-weight: bold; }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
        
        /* Form */
        input, textarea { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; padding: 10px; color: var(--text); margin-bottom: 10px; font-size: 14px; }
        textarea { min-height: 80px; resize: vertical; }
        label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; }
        
        button { background: var(--primary); color: white; border: none; border-radius: 6px; padding: 10px 20px; cursor: pointer; font-size: 14px; }
        button:hover { opacity: 0.9; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-danger { background: var(--danger); padding: 6px 12px; font-size: 12px; }
        
        .status { padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 13px; display: none; }
        .status.success { background: rgba(16,185,129,0.2); color: #34d399; display: block; }
        .status.error { background: rgba(239,68,68,0.2); color: #f87171; display: block; }
        
        .account { display: flex; justify-content: space-between; align-items: center; background: var(--bg-input); padding: 12px; border-radius: 6px; margin-bottom: 8px; }
        .account-id { font-family: monospace; font-size: 13px; }
        
        .log-box { background: var(--bg-input); border-radius: 6px; padding: 12px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        
        .models { display: flex; flex-wrap: wrap; gap: 8px; }
        .model-tag { background: var(--bg-input); padding: 6px 12px; border-radius: 6px; font-size: 12px; font-family: monospace; }
        
        select { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; padding: 10px; color: var(--text); margin-bottom: 10px; font-size: 14px; }
        details { margin-bottom: 12px; }
        summary { cursor: pointer; color: var(--primary); font-size: 0.85rem; }
        ol { margin: 8px 0 0 20px; font-size: 0.85rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>WebMimoToOpenAIAPI</h1>
            <p><a href="https://github.com/zhangjiabo522/WebMimoToOpenAIAPI" target="_blank">GitHub</a></p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" data-tab="stats">统计</div>
            <div class="tab" data-tab="settings">设置</div>
            <div class="tab" data-tab="accounts">账号</div>
        </div>

        <!-- Stats Tab -->
        <div id="tab-stats" class="tab-content active">
            <div class="card">
                <h2>用量统计</h2>
                <div class="stats-grid">
                    <div class="stat-item"><div class="stat-value" id="today-requests">0</div><div class="stat-label">今日请求</div></div>
                    <div class="stat-item"><div class="stat-value" id="today-tokens">0</div><div class="stat-label">今日 Tokens</div></div>
                    <div class="stat-item"><div class="stat-value" id="avg-time">0s</div><div class="stat-label">平均响应</div></div>
                    <div class="stat-item"><div class="stat-value" id="total-requests">0</div><div class="stat-label">累计请求</div></div>
                    <div class="stat-item"><div class="stat-value" id="total-tokens">0</div><div class="stat-label">累计 Tokens</div></div>
                    <div class="stat-item"><div class="stat-value" id="today-input">0</div><div class="stat-label">输入 Tokens</div></div>
                </div>
                <button class="btn-outline" onclick="resetUsage()" style="margin-top:12px;width:100%">重置统计</button>
            </div>
            
            <div class="card">
                <h2>实时日志</h2>
                <div id="logs" class="log-box"></div>
            </div>
            
            <div class="card">
                <h2>可用模型</h2>
                <div id="models" class="models"></div>
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="tab-settings" class="tab-content">
            <div class="card">
                <h2>系统设置</h2>
                <label>系统提示词 (每次请求都会带上)</label>
                <textarea id="systemPrompt" placeholder="你是一个有用的AI助手..."></textarea>
                <button onclick="saveSettings()">保存</button>
                <div id="settingsResult"></div>
            </div>
            
            <div class="card">
                <h2>API Keys</h2>
                <label>多个 Key 用逗号分隔</label>
                <input type="text" id="apiKeys" placeholder="sk-key1, sk-key2">
                <button onclick="saveKeys()">保存</button>
                <div id="keysResult"></div>
            </div>

            <div class="card">
                <h2>邮箱通知</h2>
                <label>启用邮箱通知</label>
                <select id="emailEnabled">
                    <option value="false">禁用</option>
                    <option value="true">启用</option>
                </select>
                <label>SMTP 服务器</label>
                <input type="text" id="emailHost" placeholder="smtp.qq.com">
                <label>SMTP 端口</label>
                <input type="number" id="emailPort" value="587">
                <label>邮箱账号</label>
                <input type="text" id="emailUser" placeholder="user@example.com">
                <label>邮箱密码/授权码</label>
                <input type="password" id="emailPassword" placeholder="授权码">
                <label>发件人</label>
                <input type="text" id="emailFrom" placeholder="user@example.com">
                <label>收件人</label>
                <input type="text" id="emailTo" placeholder="to@example.com">
                <button onclick="saveEmailSettings()">保存</button>
                <button class="btn-outline" onclick="testEmail()" style="margin-left:8px">发送测试</button>
                <div id="emailResult"></div>
            </div>

            <div class="card">
                <h2>账号模式</h2>
                <label>多账号调用方式</label>
                <select id="accountMode" onchange="saveAccountMode()">
                    <option value="random">随机</option>
                    <option value="round">轮询</option>
                </select>
                <div id="accountModeResult"></div>
            </div>
        </div>

        <!-- Accounts Tab -->
        <div id="tab-accounts" class="tab-content">
            <div class="card">
                <h2>添加账号</h2>
                <details>
                    <summary>如何获取凭证?</summary>
                    <ol>
                        <li>登录 <a href="https://aistudio.xiaomimimo.com" target="_blank">aistudio.xiaomimimo.com</a></li>
                        <li>F12 → Network → 发送消息 → 找到 chat 请求</li>
                        <li>右键 → Copy as cURL → 粘贴到下方</li>
                    </ol>
                </details>
                <textarea id="curl" placeholder="粘贴 cURL 命令..."></textarea>
                <button onclick="parse()">解析</button>
                <div id="parseResult"></div>
            </div>
            
            <div class="card">
                <h2>账号列表</h2>
                <div id="accounts"></div>
            </div>
        </div>
    </div>

    <script>
        let cfg = { api_keys: '', mimo_accounts: [], system_prompt: '' };
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('tab-' + this.dataset.tab).classList.add('active');
            });
        });
        
        async function load() {
            cfg = await (await fetch('/api/config')).json();
            document.getElementById('apiKeys').value = cfg.api_keys || '';
            document.getElementById('systemPrompt').value = cfg.system_prompt || '';
            document.getElementById('accountMode').value = cfg.account_mode || 'random';
            document.getElementById('emailEnabled').value = cfg.email_enabled ? 'true' : 'false';
            document.getElementById('emailHost').value = cfg.email_host || '';
            document.getElementById('emailPort').value = cfg.email_port || 587;
            document.getElementById('emailUser').value = cfg.email_user || '';
            document.getElementById('emailFrom').value = cfg.email_from || '';
            document.getElementById('emailTo').value = cfg.email_to || '';
            renderAccounts();
            loadStats();
            loadModels();
            connectLogs();
            setInterval(loadStats, 5000);
        }
        
        async function saveSettings() {
            cfg.system_prompt = document.getElementById('systemPrompt').value;
            await fetch('/api/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(cfg) });
            show('settingsResult', 'success', '已保存');
        }
        
        async function saveKeys() {
            cfg.api_keys = document.getElementById('apiKeys').value;
            await fetch('/api/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(cfg) });
            show('keysResult', 'success', '已保存');
        }
        
        async function saveEmailSettings() {
            cfg.email_enabled = document.getElementById('emailEnabled').value === 'true';
            cfg.email_host = document.getElementById('emailHost').value;
            cfg.email_port = parseInt(document.getElementById('emailPort').value) || 587;
            cfg.email_user = document.getElementById('emailUser').value;
            cfg.email_password = document.getElementById('emailPassword').value;
            cfg.email_from = document.getElementById('emailFrom').value;
            cfg.email_to = document.getElementById('emailTo').value;
            await fetch('/api/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(cfg) });
            show('emailResult', 'success', '已保存');
        }
        
        async function testEmail() {
            const res = await (await fetch('/api/test-email', { method: 'POST' })).json();
            if (res.status === 'ok') {
                show('emailResult', 'success', '测试邮件已发送');
            } else {
                show('emailResult', 'error', res.message || '发送失败');
            }
        }
        
        async function saveAccountMode() {
            cfg.account_mode = document.getElementById('accountMode').value;
            await fetch('/api/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(cfg) });
            show('accountModeResult', 'success', '已保存');
        }
        
        async function loadStats() {
            try {
                const s = await (await fetch('/api/usage')).json();
                document.getElementById('today-requests').textContent = s.today.requests;
                document.getElementById('today-tokens').textContent = fmtNum(s.today.total_tokens);
                document.getElementById('today-input').textContent = fmtNum(s.today.prompt_tokens);
                document.getElementById('avg-time').textContent = s.today.avg_seconds + 's';
                document.getElementById('total-requests').textContent = fmtNum(s.total.requests);
                document.getElementById('total-tokens').textContent = fmtNum(s.total.total_tokens);
            } catch(e) {}
        }
        
        async function loadModels() {
            try {
                const d = await (await fetch('/v1/models')).json();
                document.getElementById('models').innerHTML = d.data.map(m => '<div class="model-tag">' + m.id + '</div>').join('');
            } catch(e) {}
        }
        
        function fmtNum(n) { return n >= 1000 ? (n/1000).toFixed(1) + 'k' : n; }
        
        function renderAccounts() {
            const d = document.getElementById('accounts');
            if (cfg.mimo_accounts?.length) {
                d.innerHTML = cfg.mimo_accounts.map((a, i) => '<div class="account"><span class="account-id">ID: ' + a.user_id + '</span><button class="btn-danger" onclick="del(' + i + ')">删除</button></div>').join('');
            } else {
                d.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px">暂无账号</div>';
            }
        }
        
        function show(id, cls, msg) {
            const d = document.getElementById(id);
            d.className = 'status ' + cls;
            d.textContent = msg;
            setTimeout(() => d.className = 'status', 2000);
        }
        
        async function parse() {
            const curl = document.getElementById('curl').value;
            if (!curl) return;
            try {
                const res = await (await fetch('/api/parse-curl', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({curl}) })).json();
                if (res.service_token) {
                    cfg.mimo_accounts.push(res);
                    await fetch('/api/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(cfg) });
                    renderAccounts();
                    show('parseResult', 'success', '添加成功');
                } else {
                    show('parseResult', 'error', '解析失败');
                }
            } catch(e) { show('parseResult', 'error', '解析失败'); }
        }
        
        async function del(i) {
            if (!confirm('确定删除?')) return;
            cfg.mimo_accounts.splice(i, 1);
            await fetch('/api/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(cfg) });
            renderAccounts();
        }
        
        async function resetUsage() {
            if (!confirm('确定重置?')) return;
            await fetch('/api/usage/reset', { method: 'POST' });
            loadStats();
        }
        
        function connectLogs() {
            const es = new EventSource('/api/logs');
            es.onmessage = function(e) {
                try {
                    const d = JSON.parse(e.data);
                    const box = document.getElementById('logs');
                    box.innerHTML = box.innerHTML + '<div>' + (d.time || '') + ' ' + d.msg + '</div>';
                    box.scrollTop = box.scrollHeight;
                } catch(e) {}
            };
        }
        
        load();
    </script>
</body>
</html>
